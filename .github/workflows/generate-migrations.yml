name: Generate Payload Migrations

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for existing migrations
        id: check
        run: |
          if ls migrations/*.ts 2>/dev/null | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate initial migration
        if: steps.check.outputs.exists == 'false'
        env:
          PAYLOAD_SECRET: generate-migrations-only
          DATABASE_URL: file:./migration-gen.db
          PAYLOAD_CONFIG_PATH: payload.config.ts
        run: node --import tsx/esm ./node_modules/payload/bin.js --disable-transpile migrate:create --name initial --force-accept-warning

      - name: Commit migration files
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add migrations/
          git commit -m "feat: generate initial Payload migration schema" || echo "Nothing to commit"
          git push

